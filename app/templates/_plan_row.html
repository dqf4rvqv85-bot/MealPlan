<tr id="item-{{ item.id }}">
  <td>
    <a class="recipe" href="/recipes/{{ recipe.id }}">{{ recipe.title }}</a>
    {% if recipe.meal_type %}<span class="pill">{{ recipe.meal_type }}</span>{% endif %}
  </td>
  <td>
    <input type="number" min="1" value="{{ item.servings }}"
           hx-post="/plan/items/{{ item.id }}/servings"
           hx-trigger="change" hx-swap="none" name="servings">
  </td>
  <td>
    <button class="secondary"
            hx-post="/plan/items/{{ item.id }}/swap"
            hx-target="#item-{{ item.id }}" hx-swap="outerHTML">Swap</button>
    <button class="secondary"
            hx-post="/plan/items/{{ item.id }}/remove"
            hx-target="#item-{{ item.id }}" hx-swap="outerHTML">Remove</button>
  </td>
</tr>
